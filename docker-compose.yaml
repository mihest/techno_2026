services:
    postgres:
        image: postgis/postgis:16-3.4
        container_name: postgres
        volumes:
            - postgres_data:/var/lib/postgresql/data/
            - ./sql_init:/docker-entrypoint-initdb.d
        ports:
            - "5433:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: techno_2026
        networks:
            - work

    accounts:
        build:
            context: ./backend/
        ports:
            - "8081:8081"
        depends_on:
            - postgres
        environment:
            - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=999999999
            - JWT_REFRESH_TOKEN_EXPIRE_DAYS=30

            - POSTGRES_HOST=postgres
            - POSTGRES_PORT=5432
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=techno_2026
        networks:
            - work


    nginx:
        image: nginx:stable-alpine
        ports:
            - "80:80"
            - "443:443"
            - "5050:5050"
        volumes:
            - './ssl:/etc/nginx/ssl'
            - './nginx.conf:/etc/nginx/nginx.conf'
            - './front/dist:/frontend'
        environment:
            - ENABLE_IPV6=false
        depends_on:
            - accounts
        networks:
            - work

networks:
    work:

volumes:
    postgres_data: