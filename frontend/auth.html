<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация — ГорКвест</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/assets/fonts/fontawesome-free-7.2.0-web/css/all.min.css">
</head>
<body>
<header class="app-header">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
</header>

<main class="main-content flex items-center justify-center">
    <div class="container">
        <div class="card animate-pop">
            <div class="card-body">
                <h2 class="gradient-text text-center mb-16">Вход / Регистрация</h2>
                <div class="tabs mb-16">
                    <button class="tab active" id="tabLogin">Вход</button>
                    <button class="tab" id="tabRegister">Регистрация</button>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                        <input name="email" type="email" class="form-input" placeholder="user@demo.ru" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Пароль</label>
                        <input name="password" type="password" class="form-input" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fas fa-sign-in-alt"></i>
                        Войти
                    </button>
                </form>
                <form id="registerForm" class="hidden">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                        <input name="email" type="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Пароль (≥6 символов)</label>
                        <input name="password" type="password" class="form-input" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Подтверждение</label>
                        <input name="confirm_password" type="password" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-user"></i> Никнейм</label>
                        <input name="username" type="text" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-calendar-alt"></i> Возрастная группа</label>
                        <select class="form-select" name="age_category" required>
                            <option value="">Выберите...</option>
                            <option>14-15</option>
                            <option>16-17</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-accent btn-block btn-lg"><i class="fas fa-user-plus"></i>
                        Зарегистрироваться
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="src/js/app.js"></script>
<script src="src/js/auth.js"></script>
</body>
</html>
