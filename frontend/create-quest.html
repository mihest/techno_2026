<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание квеста — ГорКвест</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/assets/fonts/fontawesome-free-7.2.0-web/css/all.min.css">
</head>
<body class="has-sidebar">
<header class="app-header">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <div class="header-actions">
        <a href="auth.html" class="btn btn-ghost btn-sm" data-auth><i class="fas fa-sign-in-alt"></i> Войти</a>
        <a href="moderation.html" class="badge badge-warning" data-role="moderator"><i class="fas fa-shield-alt"></i>
            Модератор</a>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <h2 class="mb-16"><i class="fas fa-plus-circle"></i> Создание квеста</h2>
        <div class="progress-bar mb-16">
            <div class="progress-fill" id="progressBar" style="width:33%;"></div>
        </div>

        <!-- Шаг 1 -->
        <div id="step1">
            <div class="card">
                <div class="card-body">
                    <h3>Шаг 1 — Основное</h3>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-heading"></i> Название</label>
                        <input type="text" class="form-input" id="qTitle" placeholder="Минимум 5 символов">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-align-left"></i> Описание</label>
                        <textarea class="form-textarea" id="qDesc" placeholder="Минимум 30 символов"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-map-marker-alt"></i> Район / город</label>
                        <input type="text" class="form-input" id="qDistrict" placeholder="ЦАО, Москва">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-star"></i> Сложность: <span
                                id="diffLabel">3</span></label>
                        <input type="range" min="1" max="5" value="3" class="form-input" id="qDifficulty"
                               oninput="document.getElementById('diffLabel').textContent = this.value">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-clock"></i> Длительность (мин)</label>
                        <input type="number" class="form-input" id="qDuration" value="60" min="10">
                    </div>
                    <button class="btn btn-primary btn-block" onclick="nextStep(2)">Далее <i
                            class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </div>

        <!-- Шаг 2 -->
        <div id="step2" class="hidden">
            <div class="card">
                <div class="card-body">
                    <h3>Шаг 2 — Чекпоинты</h3>
                    <div class="map-container mb-16">
                        <div class="map-placeholder">
                            <i class="fas fa-map-marker-alt fa-2x text-muted"></i>
                        </div>
                    </div>
                    <div id="checkpointsContainer">
                        <div class="checkpoint-item">
                            <span class="checkpoint-number">1</span>
                            <div class="flex-1">
                                <input class="form-input" placeholder="Название точки">
                                <input class="form-input mt-16" placeholder="Задание (мин. 20 символов)">
                            </div>
                        </div>
                        <div class="checkpoint-item">
                            <span class="checkpoint-number">2</span>
                            <div class="flex-1">
                                <input class="form-input" placeholder="Название точки">
                                <input class="form-input mt-16" placeholder="Задание (мин. 20 символов)">
                            </div>
                        </div>
                        <div class="checkpoint-item">
                            <span class="checkpoint-number">3</span>
                            <div class="flex-1">
                                <input class="form-input" placeholder="Название точки">
                                <input class="form-input mt-16" placeholder="Задание (мин. 20 символов)">
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-ghost btn-sm mt-16" onclick="addCheckpoint()">
                        <i class="fas fa-plus"></i> Добавить точку
                    </button>
                    <div class="flex gap-8 mt-16">
                        <button class="btn btn-ghost" onclick="nextStep(1)"><i class="fas fa-arrow-left"></i> Назад
                        </button>
                        <button class="btn btn-primary" onclick="nextStep(3)">Далее <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Шаг 3 -->
        <div id="step3" class="hidden">
            <div class="card">
                <div class="card-body">
                    <h3>Шаг 3 — Предпросмотр</h3>
                    <p><strong id="previewTitle"></strong></p>
                    <p class="text-secondary">Район: <span id="previewDistrict"></span></p>
                    <p class="text-secondary">Сложность: <span id="previewDiff"></span></p>
                    <p class="text-secondary">Длительность: <span id="previewDur"></span> мин</p>
                    <p class="text-secondary">Чекпоинтов: <span id="previewCP"></span></p>
                    <div class="flex gap-8 mt-16">
                        <button class="btn btn-ghost" onclick="nextStep(2)"><i class="fas fa-arrow-left"></i> Назад
                        </button>
                        <button class="btn btn-outline" onclick="showToast('Черновик сохранён','success')">
                            <i class="fas fa-save"></i> Черновик
                        </button>
                        <button class="btn btn-accent" onclick="showToast('Отправлено на модерацию!','success')">
                            <i class="fas fa-paper-plane"></i> На модерацию
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

    <a href="index.html" class="tab-bar-item"><i class="fas fa-map"></i><span>Карта</span></a>
    <a href="quests.html" class="tab-bar-item"><i class="fas fa-list-ul"></i><span>Квесты</span></a>

    <a href="profile.html" class="tab-bar-item"><i class="fas fa-user"></i><span>Профиль</span></a>
</nav>

<aside class="sidebar">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-map"></i> Карта</a>
        <a href="quests.html"><i class="fas fa-list-ul"></i> Лента квестов</a>
        <a href="teams.html"><i class="fas fa-users"></i> Команды</a>
        <a href="rating.html"><i class="fas fa-trophy"></i> Рейтинг</a>
        <a href="profile.html"><i class="fas fa-user"></i> Профиль</a>

    </nav>

</body>
</html>
