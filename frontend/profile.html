<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — ГорКвест</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/assets/fonts/fontawesome-free-7.2.0-web/css/all.min.css">
</head>
<body class="has-sidebar">
<header class="app-header">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <div class="header-actions">
        <a href="auth.html" class="btn btn-ghost btn-sm" data-auth><i class="fas fa-sign-in-alt"></i> Войти</a>
        <a href="moderation.html" class="badge badge-warning" data-role="moderator"><i class="fas fa-shield-alt"></i>
            Модератор</a>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <div class="card animate-pop">
            <div class="profile-hero">
                <div class="avatar avatar-lg" id="profileAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <h2 id="profileNick">Игрок</h2>
                <span class="badge" id="profileRole">👤 Игрок</span>
            </div>
            <div class="card-body">
                <div class="stats-grid">
                    <div><span class="stat-number" id="questCount">5</span><br><small>квестов</small></div>
                    <div><span class="stat-number" id="pointsCount">320</span><br><small>очков</small></div>
                    <div><span class="stat-number"><i class="fas fa-medal"></i></span><br><small>бейджи</small></div>
                </div>
                <button class="btn btn-outline btn-block" onclick="openEditProfileModal()">
                    <i class="fas fa-edit"></i> Редактировать
                </button>
                <button class="btn btn-ghost btn-block text-danger mt-16" onclick="resetProfile()">
                    <i class="fas fa-sign-out-alt"></i> Выйти (сброс)
                </button>
            </div>
        </div>
    </div>
</main>

<nav class="tab-bar">
    <a href="index.html" class="tab-bar-item"><i class="fas fa-map"></i><span>Карта</span></a>
    <a href="quests.html" class="tab-bar-item"><i class="fas fa-list-ul"></i><span>Квесты</span></a>
    <a href="teams.html" class="tab-bar-item"><i class="fas fa-users"></i><span>Команды</span></a>
    <a href="rating.html" class="tab-bar-item"><i class="fas fa-trophy"></i><span>Рейтинг</span></a>
    <a href="profile.html" class="tab-bar-item active"><i class="fas fa-user"></i><span>Профиль</span></a>
</nav>

<aside class="sidebar">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-map"></i> Карта</a>
        <a href="quests.html"><i class="fas fa-list-ul"></i> Лента квестов</a>
        <a href="teams.html"><i class="fas fa-users"></i> Команды</a>
        <a href="rating.html"><i class="fas fa-trophy"></i> Рейтинг</a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i> Профиль</a>
        <a href="achievements.html"><i class="fas fa-medal"></i> Достижения</a>
        <a href="create-quest.html"><i class="fas fa-plus-circle"></i> Создать квест</a>
        <hr style="border-color:var(--border-light);margin:8px 0;">
        <a href="moderation.html" data-role="moderator"><i class="fas fa-shield-alt"></i> Модерация</a>
    </nav>
</aside>

<!-- Модальное окно редактирования (встроено на страницу) -->
<div class="modal-overlay hidden" id="editProfileModal">
    <div class="modal">
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
        <h3 class="modal-title"><i class="fas fa-edit"></i> Редактировать профиль</h3>
        <form onsubmit="handleEditProfile(event)">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> Никнейм</label>
                <input type="text" class="form-input" id="editNickname" required minlength="3">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-calendar-alt"></i> Возрастная группа</label>
                <select class="form-select" id="editAgeGroup">
                    <option value="14-15">14–15 лет</option>
                    <option value="16-17">16–17 лет</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-image"></i> Аватар (URL)</label>
                <input type="url" class="form-input" id="editAvatar" placeholder="https://example.com/avatar.jpg">
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Сохранить</button>
        </form>
    </div>
</div>

<script src="src/js/app.js"></script>
<script src="src/js/profile.js"></script>
</body>
</html>
