<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прохождение — ГорКвест</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/assets/fonts/fontawesome-free-7.2.0-web/css/all.min.css">
</head>
<body>
<header class="app-header">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <div class="header-actions">
        <a href="auth.html" class="btn btn-ghost btn-sm" data-auth><i class="fas fa-sign-in-alt"></i> Войти</a>
        <a href="moderation.html" class="badge badge-warning" data-role="moderator"><i class="fas fa-shield-alt"></i>
            Модератор</a>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <div class="flex justify-between items-center mb-16">
            <h3><i class="fas fa-mask"></i> Тайны Арбата</h3>
            <span class="badge badge-accent" id="sessionProgress">1/5</span>
        </div>
        <div class="progress-bar mb-16">
            <div class="progress-fill" id="progressFill" style="width:20%;"></div>
        </div>
        <div class="map-container mb-16">
            <div class="map-placeholder">
                <i class="fas fa-location-dot fa-2x text-muted"></i>
            </div>
        </div>
        <div class="session-answer-area">
            <div class="flex items-center gap-8 mb-16">
                <span class="checkpoint-number current">1</span>
                <strong>Старт у театра Вахтангова</strong>
            </div>
            <p class="text-secondary">Найдите год основания театра на фасаде здания.</p>
            <input type="text" class="form-input mt-16" placeholder="Код-слово" id="answerInput">
            <button class="btn btn-primary btn-block mt-16" onclick="submitAnswer()">
                <i class="fas fa-check"></i> Ответить
            </button>
            <button class="btn btn-ghost btn-sm mt-16"
                    onclick="showToast('Подсказка: обратите внимание на год над главным входом.')">
                <i class="fas fa-lightbulb"></i> Показать подсказку
            </button>
        </div>
        <button class="btn btn-ghost btn-block text-danger mt-16"
                onclick="if(confirm('Бросить квест?')) location.href='quest-detail.html'">
            <i class="fas fa-times-circle"></i> Бросить квест
        </button>
    </div>
</main>

<script src="src/js/app.js"></script>
</body>
</html>
