<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг — ГорКвест</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/assets/fonts/fontawesome-free-7.2.0-web/css/all.min.css">
</head>
<body class="has-sidebar">
<header class="app-header">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <div class="header-actions">
        <a href="auth.html" class="btn btn-ghost btn-sm" data-auth><i class="fas fa-sign-in-alt"></i> Войти</a>
        <a href="moderation.html" class="badge badge-warning" data-role="moderator"><i class="fas fa-shield-alt"></i>
            Модератор</a>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <h2 class="mb-16"><i class="fas fa-trophy"></i> Рейтинг команд</h2>
        <div class="tabs mb-16">
            <button class="tab active">Всё время</button>
            <button class="tab">Месяц</button>
            <button class="tab">Неделя</button>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="leaderboard-row">
                    <span class="leaderboard-rank top-1"><i class="fas fa-crown"></i></span>
                    <i class="fas fa-bolt fa-2x icon-accent"></i>
                    <div class="flex-1">
                        <strong>Адреналин</strong><br/>
                        <small class="text-secondary">12 квестов · 2100 очков</small>
                    </div>
                    <strong>2100</strong>
                </div>
                <div class="leaderboard-row">
                    <span class="leaderboard-rank top-2">2</span>
                    <i class="fas fa-moon fa-2x icon-primary"></i>
                    <div class="flex-1">
                        <strong>Ночной дозор</strong><br/>
                        <small class="text-secondary">10 квестов · 1800 очков</small>
                    </div>
                    <strong>1800</strong>
                </div>
                <div class="leaderboard-row">
                    <span class="leaderboard-rank top-3">3</span>
                    <i class="fas fa-search fa-2x icon-primary"></i>
                    <div class="flex-1">
                        <strong>Искатели</strong><br/>
                        <small class="text-secondary">8 квестов · 1250 очков</small>
                    </div>
                    <strong>1250</strong>
                </div>
            </div>
        </div>
    </div>
</main>

<nav class="tab-bar">
    <a href="index.html" class="tab-bar-item"><i class="fas fa-map"></i><span>Карта</span></a>
    <a href="quests.html" class="tab-bar-item"><i class="fas fa-list-ul"></i><span>Квесты</span></a>
    <a href="teams.html" class="tab-bar-item"><i class="fas fa-users"></i><span>Команды</span></a>
    <a href="rating.html" class="tab-bar-item active"><i class="fas fa-trophy"></i><span>Рейтинг</span></a>
    <a href="profile.html" class="tab-bar-item"><i class="fas fa-user"></i><span>Профиль</span></a>
</nav>

<aside class="sidebar">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-map"></i> Карта</a>
        <a href="quests.html"><i class="fas fa-list-ul"></i> Лента квестов</a>
        <a href="teams.html"><i class="fas fa-users"></i> Команды</a>
        <a href="rating.html" class="active"><i class="fas fa-trophy"></i> Рейтинг</a>
        <a href="profile.html"><i class="fas fa-user"></i> Профиль</a>
        <a href="achievements.html"><i class="fas fa-medal"></i> Достижения</a>
        <a href="create-quest.html"><i class="fas fa-plus-circle"></i> Создать квест</a>
        <hr style="border-color:var(--border-light);margin:8px 0;">
        <a href="moderation.html" data-role="moderator"><i class="fas fa-shield-alt"></i> Модерация</a>
    </nav>
</aside>

<script src="src/js/app.js"></script>
</body>
</html>
