<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Imprezzio: Path - Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="themes/theme-default.css" id="themeStylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" class="logo">Imprezzio:<span>Path</span></a>
                <p>Городские квесты для подростков</p>
            </div>
            
            <div class="auth-title">
                <h2><i class="fas fa-sign-in-alt"></i> Вход в аккаунт</h2>
            </div>
            
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-triangle"></i> Неверный логин или пароль. Попробуйте ещё раз.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Логин или Email</label>
                    <input type="text" name="login" class="form-input" required placeholder="Введите логин или email">
                </div>
                
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" class="form-input" required placeholder="Введите пароль">
                </div>
                
                <button type="submit" class="btn btn-primary auth-btn">
                    <i class="fas fa-arrow-right"></i> Войти
                </button>
            </form>
            
            <div class="auth-links">
                <a href="#" id="forgotPasswordLink" class="auth-link">Забыли пароль?</a>
                <div class="auth-register">
                    <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно восстановления пароля -->
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-envelope"></i> Восстановление пароля</h3>
                <button class="modal-close" id="closeForgotModal">&times;</button>
            </div>
            <form id="forgotForm">
                <div class="form-group">
                    <label>Введите ваш email</label>
                    <input type="email" name="email" class="form-input" required placeholder="name@example.ru">
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Отправить ссылку</button>
            </form>
        </div>
    </div>

    <script src="js/theme-switcher.js"></script>
    <script>
        // Модальное окно восстановления пароля
        const forgotLink = document.getElementById('forgotPasswordLink');
        const forgotModal = document.getElementById('forgotModal');
        const closeForgotModal = document.getElementById('closeForgotModal');
        
        function openForgotModal() {
            forgotModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeForgotModalFunc() {
            forgotModal.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        forgotLink?.addEventListener('click', (e) => {
            e.preventDefault();
            openForgotModal();
        });
        
        closeForgotModal?.addEventListener('click', closeForgotModalFunc);
        forgotModal?.addEventListener('click', (e) => {
            if (e.target === forgotModal) closeForgotModalFunc();
        });
        
        // Форма входа
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        
        loginForm?.addEventListener('submit', (e) => {
            e.preventDefault();
            const login = loginForm.querySelector('input[name="login"]').value;
            const password = loginForm.querySelector('input[name="password"]').value;
            
            if (login === 'alex@imprezzio.ru' && password === 'password123') {
                window.location.href = '../index.html';
            } else {
                errorMessage.style.display = 'block';
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        });
        
        // Форма восстановления
        document.getElementById('forgotForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Ссылка для восстановления пароля отправлена на вашу почту');
            closeForgotModalFunc();
        });
    </script>
</body>
</html>
