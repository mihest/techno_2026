<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Imprezzio: Path - Прохождение квеста</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="themes/theme-default.css" id="themeStylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">Imprezzio:<span>Path</span></a>
            <div class="nav-links">
                <a href="../index.html">Квесты</a>
                <a href="rating.html">Рейтинг</a>
                <a href="profile.html">Профиль</a>
                <a href="create-quest.html">Создать</a>
                <a href="moderation.html">Модерация</a>
            </div>
            <div class="header-controls">
                <div class="theme-selector">
                    <i class="fas fa-palette"></i>
                    <div class="custom-select-wrapper">
                        <select id="themeSelect" class="theme-select">
                            <option value="default">Neon Pop</option>
                            <option value="neon-sunset">Neon Sunset</option>
                            <option value="cyberpunk">Cyberpunk 2077</option>
                            <option value="tropical">Tropical Juice</option>
                            <option value="ice-flame">Ice Flame</option>
                            <option value="space-rave">Space Rave</option>
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выйти</span>
                </button>
            </div>
            <button class="burger-btn" id="burgerBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <button class="close-menu" id="closeMenuBtn"><i class="fas fa-times"></i></button>
        <a href="../index.html">Квесты</a>
        <a href="rating.html">Рейтинг</a>
        <a href="profile.html">Профиль</a>
        <a href="create-quest.html">Создать</a>
        <a href="moderation.html">Модерация</a>
        <div class="mobile-theme-selector">
            <i class="fas fa-palette"></i>
            <div class="custom-select-wrapper">
                <select id="mobileThemeSelect" class="theme-select">
                    <option value="default">Neon Pop</option>
                    <option value="neon-sunset">Neon Sunset</option>
                    <option value="cyberpunk">Cyberpunk 2077</option>
                    <option value="tropical">Tropical Juice</option>
                    <option value="ice-flame">Ice Flame</option>
                    <option value="space-rave">Space Rave</option>
                </select>
                <i class="fas fa-chevron-down select-arrow"></i>
            </div>
        </div>
        <button class="logout-btn mobile-logout" id="mobileLogoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Выйти из аккаунта</span>
        </button>
    </div>

    <main class="play-container" id="playContent"></main>

    <!-- Модальное окно для сообщений -->
    <div id="messageModal" class="custom-modal">
        <div class="modal-window">
            <i id="modalIcon" class="fas fa-info-circle"></i>
            <h3 id="modalTitle">Внимание</h3>
            <p id="modalMessage">Сообщение</p>
            <div class="modal-buttons">
                <button class="btn btn-primary" id="modalOkBtn">Хорошо</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно жалобы на чекпоинт -->
    <div id="complaintModal" class="custom-modal">
        <div class="modal-window complaint-modal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3><i class="fas fa-flag" style="color: var(--red);"></i> Пожаловаться на чекпоинт</h3>
                <button id="closeComplaintModal" style="background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <form id="complaintForm">
                <div class="form-group">
                    <label>Причина жалобы</label>
                    <select name="reason" id="complaintReason" required>
                        <option value="">Выберите причину</option>
                        <option value="wrong">Неверная информация в задании</option>
                        <option value="broken">Неработающий чекпоинт</option>
                        <option value="offensive">Оскорбительное содержание</option>
                        <option value="dangerous">Опасное местоположение</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Подробное описание</label>
                    <textarea id="complaintDescription" rows="4" required minlength="20" placeholder="Опишите проблему подробно..."></textarea>
                </div>
                <input type="hidden" id="complaintCheckpointId" value="">
                <input type="hidden" id="complaintCheckpointTitle" value="">
                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-outline" id="cancelComplaintBtn">Отмена</button>
                    <button type="submit" class="btn btn-danger">Отправить жалобу</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://api-maps.yandex.ru/2.1/?apikey=ваш_ключ_api&lang=ru_RU"></script>
    <script src="js/theme-switcher.js"></script>
    <script src="js/auth-api.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/quest-play.js"></script>
</body>
</html>
