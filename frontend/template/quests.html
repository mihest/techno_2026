<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента квестов — ГорКвест</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="has-sidebar">
<header class="app-header">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <div class="header-actions">
        <a href="auth.html" class="btn btn-ghost btn-sm" data-auth><i class="fas fa-sign-in-alt"></i> Войти</a>
        <a href="moderation.html" class="badge badge-warning" data-role="moderator"><i class="fas fa-shield-alt"></i> Модератор</a>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <h2 class="mb-16"><i class="fas fa-list-ul"></i> Лента квестов</h2>
        <div class="filter-chips">
            <button class="filter-chip active">Все</button>
            <button class="filter-chip"><i class="fas fa-star"></i> 1-2</button>
            <button class="filter-chip"><i class="fas fa-star"></i> 3</button>
            <button class="filter-chip"><i class="fas fa-star"></i> 4-5</button>
        </div>
        <div class="quest-grid" id="questsGrid"></div>
    </div>
</main>

<nav class="tab-bar">
    <a href="index.html" class="tab-bar-item"><i class="fas fa-map"></i><span>Карта</span></a>
    <a href="quests.html" class="tab-bar-item active"><i class="fas fa-list-ul"></i><span>Квесты</span></a>
    <a href="teams.html" class="tab-bar-item"><i class="fas fa-users"></i><span>Команды</span></a>
    <a href="rating.html" class="tab-bar-item"><i class="fas fa-trophy"></i><span>Рейтинг</span></a>
    <a href="profile.html" class="tab-bar-item"><i class="fas fa-user"></i><span>Профиль</span></a>
</nav>

<aside class="sidebar">
    <a href="index.html" class="app-logo">
        <span class="logo-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="gradient-text">ГорКвест</span>
    </a>
    <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-map"></i> Карта</a>
        <a href="quests.html" class="active"><i class="fas fa-list-ul"></i> Лента квестов</a>
        <a href="teams.html"><i class="fas fa-users"></i> Команды</a>
        <a href="rating.html"><i class="fas fa-trophy"></i> Рейтинг</a>
        <a href="profile.html"><i class="fas fa-user"></i> Профиль</a>
        <a href="achievements.html"><i class="fas fa-medal"></i> Достижения</a>
        <a href="create-quest.html"><i class="fas fa-plus-circle"></i> Создать квест</a>
        <hr style="border-color:var(--border-light);margin:8px 0;">
        <a href="moderation.html" data-role="moderator" class="hidden"><i class="fas fa-shield-alt"></i> Модерация</a>
    </nav>
</aside>

<script src="app.js"></script>
<script>
    const quests = [
        { title:'Тайны Арбата', district:'ЦАО', diff:2, duration:45, points:5, icon:'fa-mask' },
        { title:'Парк Горького', district:'ЦАО', diff:3, duration:60, points:7, icon:'fa-tree' },
        { title:'ВДНХ: Космический', district:'СВАО', diff:4, duration:90, points:6, icon:'fa-rocket' },
    ];
    document.getElementById('questsGrid').innerHTML = quests.map(q => `
      <div class="card card-interactive" onclick="location.href='quest-detail.html'">
        <div class="quest-card-img">
          <i class="fas ${q.icon} fa-3x icon-primary"></i>
        </div>
        <div class="quest-card-body">
          <h3>${q.title}</h3>
          <p class="text-secondary"><i class="fas fa-map-marker-alt"></i> ${q.district}</p>
          <div class="flex gap-8 mt-16">
            <span class="badge badge-primary"><i class="fas fa-star"></i> ${q.diff}</span>
            <span class="badge badge-accent"><i class="fas fa-clock"></i> ${q.duration} мин</span>
            <span class="badge badge-success"><i class="fas fa-flag"></i> ${q.points} точек</span>
          </div>
        </div>
      </div>
    `).join('');
</script>
</body>
</html>
