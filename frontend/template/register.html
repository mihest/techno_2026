<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Imprezzio: Path - Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="themes/theme-default.css" id="themeStylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="../index.html" class="logo">Imprezzio:<span>Path</span></a>
                <p>Присоединяйся к приключениям!</p>
            </div>
            
            <div class="auth-title">
                <h2><i class="fas fa-user-plus"></i> Регистрация</h2>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="required">Логин</label>
                    <input type="text" name="username" class="form-input" id="username" required minlength="4" maxlength="20" pattern="[a-zA-Z0-9_]+" placeholder="Только латиница, цифры и _">
                    <small class="input-hint">От 4 до 20 символов</small>
                </div>
                
                <div class="form-group">
                    <label class="required">Email</label>
                    <input type="email" name="email" class="form-input" id="email" required placeholder="name@example.ru">
                </div>
                
                <div class="form-group">
                    <label class="required">Пароль</label>
                    <input type="password" name="password" class="form-input" id="password" required minlength="6" placeholder="Минимум 6 символов">
                    <small class="input-hint">Не используйте 123456 или qwerty</small>
                </div>
                
                <div class="form-group">
                    <label class="required">Подтверждение пароля</label>
                    <input type="password" name="confirmPassword" class="form-input" id="confirmPassword" required placeholder="Повторите пароль">
                </div>
                
                <div class="form-group">
                    <label class="required">Возрастная группа</label>
                    <div class="custom-select-wrapper">
                        <select name="ageGroup" id="ageGroup" class="custom-select" required>
                            <option value="">Выберите возраст</option>
                            <option value="under14">Мне нет 14</option>
                            <option value="14-15">14-15 лет</option>
                            <option value="15-16">15-16 лет</option>
                            <option value="16-17">16-17 лет</option>
                            <option value="18plus">Мне есть 18</option>
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <label class="custom-checkbox">
                        <input type="checkbox" name="agreeRules" id="agreeRules" required>
                        <span class="checkbox-mark"></span>
                        <span>Я согласен с <a href="#" class="rules-link">правилами сервиса</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary auth-btn" id="submitBtn" disabled>
                    <i class="fas fa-check-circle"></i> Зарегистрироваться
                </button>
            </form>
            
            <div class="auth-register">
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const agreeCheckbox = document.getElementById('agreeRules');
        const passwordField = document.getElementById('password');
        const confirmField = document.getElementById('confirmPassword');
        const usernameField = document.getElementById('username');
        const emailField = document.getElementById('email');
        
        function validateForm() {
            const isAgreed = agreeCheckbox.checked;
            const isPasswordValid = passwordField.value.length >= 6 && 
                                    passwordField.value !== '123456' && 
                                    passwordField.value !== 'qwerty';
            const isConfirmValid = passwordField.value === confirmField.value;
            const isUsernameValid = /^[a-zA-Z0-9_]{4,20}$/.test(usernameField.value);
            const isEmailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailField.value);
            
            submitBtn.disabled = !(isAgreed && isPasswordValid && isConfirmValid && isUsernameValid && isEmailValid);
        }
        
        agreeCheckbox?.addEventListener('change', validateForm);
        passwordField?.addEventListener('input', validateForm);
        confirmField?.addEventListener('input', validateForm);
        usernameField?.addEventListener('input', validateForm);
        emailField?.addEventListener('input', validateForm);
        
        form?.addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (passwordField.value !== confirmField.value) {
                alert('Пароли не совпадают!');
                return;
            }
            
            if (passwordField.value === '123456' || passwordField.value === 'qwerty') {
                alert('Пароль слишком простой! Придумайте более сложный пароль.');
                return;
            }
            
            alert('Регистрация успешна! Добро пожаловать в Imprezzio:Path!');
            window.location.href = '../index.html';
        });
        
        validateForm();
    </script>
</body>
</html>
