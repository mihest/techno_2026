user  root;
worker_processes  5;

events {
}

http {
    include /etc/nginx/mime.types;

    types {
        application/javascript    js mjs;
        text/javascript          js mjs;
        text/css                 css;
        image/svg+xml           svg svgz;
    }

    server {
		listen		 443;
		listen       80;
		listen       5050;
        server_name  bpmcontrol.ru www.bpmcontrol.ru;

        location / {
            proxy_pass http://accounts:8081;
            proxy_set_header Host $host;
        }

    }
}